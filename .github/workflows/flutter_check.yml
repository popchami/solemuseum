name: Flutter Check

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/flutter_check.yml'

jobs:
  flutter-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

      - name: Test
        working-directory: app
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test directory found. Skipping flutter test."
          fi
