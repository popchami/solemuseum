name: solemuseum
description: "SoleMuseum - Digital Sneaker Collection Museum"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2

  # Media
  image_picker: ^1.0.7
  file_picker: ^12.0.0-beta.7
  share_plus: ^13.1.0
  cross_file: ^0.3.4+2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter_native_splash:
  color: "#111111"
  image: "assets/splash/splash_logo.png"
  android_12:
    color: "#111111"
    image: "assets/splash/splash_logo.png"
  fullscreen: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash/
