name: kickxkick
description: "Kick×Kick - Sneaker Sticker Collection App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2

  # Media
  image_picker: ^1.0.7
  file_picker: ^12.0.0-beta.7
  share_plus: ^13.1.0
  cross_file: ^0.3.4+2
  image: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-VF.ttf

  assets:
    - assets/data/brands.json
    - assets/data/models.json
    - assets/data/aliases.json
    - assets/data/search_keywords.json
