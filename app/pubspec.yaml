name: solemuseum
description: "SoleMuseum - Digital Sneaker Collection Museum"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2

  # Media
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  cross_file: ^0.3.4+2

  # Material Design
  flutter_adaptive_scaffold: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
